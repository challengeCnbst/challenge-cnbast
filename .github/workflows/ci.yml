name: 'Continuous Integration'

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Configurar la versión correcta de Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Instalar dependencias del sistema
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # Instalar dependencias del proyecto
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install -r requirements.txt

      # Entrenar el modelo solo si el archivo .pkl no existe
      - name: Train model if missing
        run: |
          if [ ! -f model.pkl ]; then
            python challenge/train.py
          fi

      # Correr pruebas del modelo y api
      - name: Run model test
        run: |
          pytest tests/model/test_model.py -v

      - name: Run api test
        run: |
          pytest tests/api/test_api.py -v
